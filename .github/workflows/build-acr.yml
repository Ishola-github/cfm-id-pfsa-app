name: Build and Push to ACR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}                  # e.g. pfasregistry19800
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}  # e.g. pfasregistry19800.azurecr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure CLI (if needed)
        run: |
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}        # JSON with clientId, clientSecret, tenantId, subscriptionId

      - name: Log in Docker to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.ACR_LOGIN_SERVER }}/pfas:latest  # creates repo 'pfas' on first push

      - name: Show tags in ACR
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr repository show-tags \
              --name "$ACR_NAME" \
              --repository pfas \
              --output table
