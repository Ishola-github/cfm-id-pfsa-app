# Delete and recreate the workflow file completely fresh
rm .github/workflows/build-acr.yml

cat > .github/workflows/build-acr.yml << 'EOF'
name: Docker Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: docker/setup-buildx-action@v3
    
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        no-cache: true
        tags: sundayayobami/pfas-msms-tox:latest

    - run: echo "Build completed successfully"
EOF

git add .
git commit -m "Minimal clean workflow"
git push